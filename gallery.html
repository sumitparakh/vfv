    <style>
        .catering-gallery { padding: 80px 0 60px; }
        .catering-gallery .gallery-item {
            position: relative;
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }
        .catering-gallery .gallery-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .catering-gallery .gallery-item:hover img { transform: scale(1.06); }
        .catering-gallery .gallery-item::after {
            content: "\f00e";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .catering-gallery .gallery-item:hover::after { opacity: 1; }
        .catering-gallery .gallery-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.35);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .catering-gallery .gallery-item:hover::before { opacity: 1; }
        .gallery-hero { padding: 120px 0 60px; text-align: center; }
        .gallery-hero h2 { font-size: 42px; margin-bottom: 10px; }
        .gallery-hero p { max-width: 680px; margin: 0 auto; color: #6b6b6b; }
    </style>
